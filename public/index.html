<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebRTC Studio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="landing">
    <div class="landing-card">

      <div class="landing-logo">
        <div class="landing-logo-icon">📡</div>
        <h1>WebRTC Studio</h1>
        <span class="badge">BETA</span>
      </div>
      <p class="landing-subtitle">Živé video přes prohlížeč · nízká latence · bez instalace</p>

      <!-- Vytvoř místnost -->
      <div class="form-group">
        <label>Tvoje jméno</label>
        <input type="text" id="userName" placeholder="Zadej jméno..." maxlength="30" />
      </div>

      <button class="btn btn-primary btn-full btn-lg" onclick="createRoom()">
        ✨ Vytvořit novou místnost
      </button>

      <div class="divider">nebo připojit se</div>

      <!-- Připoj se ke místnosti -->
      <div class="form-group">
        <label>ID místnosti</label>
        <div class="form-row">
          <input type="text" id="roomInput" placeholder="Zadej ID místnosti..." maxlength="20" />
          <button class="btn btn-secondary" onclick="joinRoom()">Připojit</button>
        </div>
      </div>

    </div>
  </div>

  <script>
    // If the user refreshed or accidentally navigated away from a room,
    // send them straight back without going through the form again.
    (function() {
      var last = localStorage.getItem('webrtc-last-room');
      if (last && last.includes('room.html')) {
        window.location.replace(last);
      }
    })();

    // Načti uloženou hodnotu jména
    const savedName = localStorage.getItem('webrtc-name');
    if (savedName) document.getElementById('userName').value = savedName;

    // Zkontroluj URL parametr ?room=...
    const urlRoom = new URLSearchParams(window.location.search).get('room');
    if (urlRoom) document.getElementById('roomInput').value = urlRoom;

    function generateRoomId() {
      const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
      let id = '';
      for (let i = 0; i < 8; i++) id += chars[Math.floor(Math.random() * chars.length)];
      return id;
    }

    function getName() {
      const name = document.getElementById('userName').value.trim() || 'Anon';
      localStorage.setItem('webrtc-name', name);
      return name;
    }

    function createRoom() {
      const roomId = generateRoomId();
      const name = getName();
      window.location.href = `room.html?room=${roomId}&name=${encodeURIComponent(name)}`;
    }

    function joinRoom() {
      const roomId = document.getElementById('roomInput').value.trim();
      if (!roomId) { alert('Zadej ID místnosti.'); return; }
      const name = getName();
      window.location.href = `room.html?room=${roomId}&name=${encodeURIComponent(name)}`;
    }

    // Enter pro připojení
    document.getElementById('roomInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') joinRoom();
    });
  </script>
</body>
</html>
